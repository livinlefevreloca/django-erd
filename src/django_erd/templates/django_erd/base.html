<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Django ERD{% endblock %}</title>
    <link rel="stylesheet" href="{% url 'django_erd:css' %}">
    {% block head %}{% endblock %}
</head>
<body>
    <nav class="top-nav">
        <a href="{% url 'django_erd:index' %}" class="nav-brand">Django ERD</a>
        {% block nav %}{% endblock %}
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
