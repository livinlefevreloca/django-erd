{% extends "django_erd/base.html" %}

{% block title %}ERD — {{ component.title }}{% endblock %}

{% block head %}
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.30.4/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>
{% endblock %}

{% block nav %}
<div class="nav-controls">
    <span class="nav-title">{{ component.title }}</span>
</div>
{% endblock %}

{% block content %}
<div class="erd-container">
    <!-- Collapsible detail panel -->
    <aside id="detail-panel" class="detail-panel open">
        <div class="panel-header">
            <div class="panel-title-row">
                <h2 id="panel-model-name" class="panel-model-name">—</h2>
                <button id="panel-collapse-btn" class="panel-collapse-btn" onclick="togglePanel()" title="Collapse panel">&lsaquo;</button>
            </div>
            <div id="panel-model-meta" class="panel-model-meta"></div>
            <input type="text" id="model-search" placeholder="Search models..." oninput="filterModels(this.value)">
        </div>
        <div id="panel-body" class="panel-body">
            <ul id="model-list" class="model-list"></ul>
            <div id="model-detail" class="model-detail"></div>
        </div>
    </aside>
    <button id="panel-expand-btn" class="panel-expand-btn hidden" onclick="togglePanel()" title="Show detail panel">&rsaquo;</button>

    <!-- Graph view -->
    <div class="graph-area">
        <div class="graph-toolbar">
            <div class="toolbar-group">
                <label>Depth</label>
                <select id="depth-select" onchange="setDepth(this.value)">
                    <option value="0" selected>All</option>
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                </select>
            </div>
            <div class="toolbar-group">
                <label>Direction</label>
                <div class="toggle-group">
                    <button class="toggle-btn active" data-dir="both" onclick="setDirection('both')" disabled>Both</button>
                    <button class="toggle-btn" data-dir="references" onclick="setDirection('references')" disabled>References</button>
                    <button class="toggle-btn" data-dir="referencedBy" onclick="setDirection('referencedBy')" disabled>Referenced By</button>
                </div>
            </div>
            <div class="toolbar-group">
                <label>Exclude</label>
                <div class="dropdown" id="exclude-refs-dropdown">
                    <button class="dropdown-toggle" onclick="toggleDropdown()">None</button>
                    <div class="dropdown-menu"></div>
                </div>
            </div>
            <div class="toolbar-group">
                <label>Spread</label>
                <input type="range" id="spread-slider" min="1" max="20" value="7" oninput="debouncedSetSpread(this.value)">
            </div>
        </div>
        <div id="cy"></div>
        <div class="overhead-controls">
            <button onclick="cy && cy.fit()" title="Fit to screen">Fit</button>
            <button onclick="cy && cy.zoom(cy.zoom() * 1.3)" title="Zoom in">+</button>
            <button onclick="cy && cy.zoom(cy.zoom() / 1.3)" title="Zoom out">&minus;</button>
            <button onclick="centerOnNode(selectedModelId)" title="Center on selected model">Center</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const graphData = {{ graph_json|safe }};
</script>
<script src="{% url 'django_erd:js' %}"></script>
{% endblock %}
